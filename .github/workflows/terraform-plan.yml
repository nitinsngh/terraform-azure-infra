name: Terraform Dev Workflow

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.2

      - name: Terraform Init
        run: terraform init -backend-config=environments/dev/backend.tf

      - name: Terraform Plan
        run: terraform plan -var-file=environments/dev/variables.tf

      - name: Terraform Apply (Manual Approval)
        if: github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve -var-file=environments/dev/variables.tf

        
        
